version: 1
rules:
  - id: always-run-repository-discovery
    when: "true"
    run: repository-discovery

  - id: run-managed-assessment
    when: "state.detectedProjectTypes contains 'csharp'"
    run: managed-assessment

  - id: run-native-assessment
    when: "state.detectedProjectTypes contains 'cpp' or state.detectedProjectTypes contains 'cpp-cli'"
    run: native-assessment

  - id: run-build-assessment
    when: "state.buildEntryPoints length > 0"
    run: build-assessment

  - id: run-test-assessment
    when: "state.completedAgents contains 'build-assessment'"
    run: test-assessment

  - id: run-modernization-planner
    when: "allRequiredAssessmentsComplete == true"
    run: modernization-planner

  - id: run-validation
    when: "state.completedAgents contains 'modernization-planner'"
    run: validation

retryPolicy:
  maxAttemptsPerAgent: 2
  stopRepeatedBuildFailureAfterOccurrences: 2

humanApprovalGates:
  - ui-framework-replacement
  - interop-boundary-redesign
  - deployment-architecture-redesign
